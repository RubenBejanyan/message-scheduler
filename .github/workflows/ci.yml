name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        run: uv sync --frozen --dev

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy type check
        run: uv run mypy src/
