services:
  message_scheduler:
    image: ghcr.io/rubenbejanyan/message-scheduler:latest
    container_name: message_scheduler
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/dev_db
      REDIS_URL: redis://global_redis:6379/0
      TELETHON_SESSION_PATH: /app/user_session
    volumes:
      - ./user_session.session:/app/user_session.session
      - ./sessions:/app/sessions
    networks:
      - infra_net

networks:
  infra_net:
    external: true
    name: infra_net
