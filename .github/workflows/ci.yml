name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        run: uv sync --frozen --dev

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy type check
        run: uv run mypy src/

  docker:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/rubenbejanyan/message-scheduler:latest
          cache-from: type=registry,ref=ghcr.io/rubenbejanyan/message-scheduler:cache
          cache-to: type=registry,ref=ghcr.io/rubenbejanyan/message-scheduler:cache,mode=max
