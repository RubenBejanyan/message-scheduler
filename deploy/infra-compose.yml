services:
  postgres:
    image: postgres:15-alpine
    container_name: global_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msched}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-message_scheduler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind only to localhost — never expose postgres to the internet
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msched}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - infra_net

  redis:
    image: redis:7-alpine
    container_name: global_redis
    restart: always
    # Bind only to localhost
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - infra_net

volumes:
  postgres_data:

networks:
  infra_net:
    driver: bridge
    name: infra_net
