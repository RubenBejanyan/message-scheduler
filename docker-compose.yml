services:
  message_scheduler:
    image: ghcr.io/rubenbejanyan/message-scheduler:latest
    container_name: message_scheduler
    restart: always
    env_file:
      - .env
    networks:
      - infra_net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 message_scheduler

networks:
  infra_net:
    external: true
    name: infra_net
